<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Test Suite Execution Summary</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
/* Modern CSS for Optimized Suite Execution Summary */
.suite_summary_container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.filter_section {
    background: #e6f2ff;
    border-radius: 12px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 4px 12px rgba(0,89,169,0.1);
    color: #333;
    border: 1px solid #b3d9ff;
}

.filter_title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 20px;
    text-align: center;
    color: #0059a9;
}

.filter_grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
}

.filter_group {
    display: flex;
    flex-direction: column;
}

.filter_group label {
    font-weight: 600;
    margin-bottom: 5px;
    color: #0059a9;
    font-size: 14px;
    opacity: 0.9;
}

.filter_group input,
.filter_group select {
    padding: 10px 12px;
    border: 2px solid #b3d9ff;
    border-radius: 6px;
    font-size: 14px;
    transition: border-color 0.3s ease;
    background: white;
}

.filter_group input:focus,
.filter_group select:focus {
    outline: none;
    border-color: #0059a9;
    box-shadow: 0 0 0 3px rgba(0,89,169,0.1);
}

.action_buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.btn_run {
    background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(40,167,69,0.3);
}

.btn_run:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(40,167,69,0.4);
}

.btn_clear {
    background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(108,117,125,0.3);
}

.btn_clear:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(108,117,125,0.4);
}

.btn_export {
    background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(23,162,184,0.3);
}

.btn_export:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(23,162,184,0.4);
}

.summary_stats {
    background: white;
    border-radius: 12px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    display: none;
}

.summary_title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #333;
    border-bottom: 2px solid #e9ecef;
    padding-bottom: 10px;
}

.stats_grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
}

.stat_item {
    text-align: center;
    padding: 15px;
    border-radius: 8px;
    background: #f8f9fa;
    transition: transform 0.3s ease;
}

.stat_item:hover {
    transform: translateY(-2px);
}

.stat_value {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 5px;
}

.stat_label {
    font-size: 12px;
    text-transform: uppercase;
    color: #6c757d;
    letter-spacing: 0.5px;
}

.stat_total { background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); }
.stat_passed { background: linear-gradient(135deg, #e8f5e8 0%, #c8e6c9 100%); }
.stat_failed { background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%); }
.stat_blocked { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); }
.stat_not_run { background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); }

.results_section {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    display: none;
}

.results_title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #333;
    border-bottom: 2px solid #e9ecef;
    padding-bottom: 10px;
}

.suite_table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

.suite_table th {
    background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
    color: white;
    padding: 12px;
    text-align: left;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.suite_table td {
    padding: 12px;
    border-bottom: 1px solid #e9ecef;
    font-size: 14px;
}

.suite_table tr:hover {
    background-color: #f8f9fa;
}

.status_passed { color: #28a745; font-weight: 600; }
.status_failed { color: #dc3545; font-weight: 600; }
.status_blocked { color: #fd7e14; font-weight: 600; }
.status_not_run { color: #6c757d; font-weight: 600; }

.loading {
    text-align: center;
    padding: 40px;
    color: #6c757d;
}

.spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #007bff;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 15px 20px;
    border-radius: 8px;
    color: white;
    font-weight: 500;
    z-index: 1000;
    max-width: 300px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateX(100%);
    transition: all 0.3s ease;
}

.notification.show {
    opacity: 1;
    transform: translateX(0);
}

.notification.success { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); }
.notification.error { background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); }
.notification.info { background: linear-gradient(135deg, #17a2b8 0%, #138496 100%); }

@media (max-width: 768px) {
    .filter_grid {
        grid-template-columns: 1fr;
    }
    
    .stats_grid {
        grid-template-columns: repeat(2, 1fr);
    }
    
    .suite_table {
        font-size: 12px;
    }
    
    .suite_table th,
    .suite_table td {
        padding: 8px;
    }
}
</style>
</head>
<body>

<div class="suite_summary_container">
    <!-- Filter Section -->
    <div class="filter_section">
        <div class="filter_title">🚀 Optimized Test Suite Execution Summary</div>
        
        <div class="filter_grid">
            <div class="filter_group">
                <label for="project_id">Project</label>
                <select id="project_id" name="project_id">
                    <option value="">Loading projects...</option>
                </select>
            </div>
            
            <div class="filter_group">
                <label for="testplan_id">Test Plan</label>
                <select id="testplan_id" name="testplan_id">
                    <option value="">Select Test Plan</option>
                </select>
            </div>
            
            <div class="filter_group">
                <label for="build_id">Build</label>
                <select id="build_id" name="build_id">
                    <option value="">Select Build</option>
                </select>
            </div>
            
            <div class="filter_group">
                <label for="start_date">Start Date</label>
                <input type="date" id="start_date" name="start_date" value="">
            </div>
            
            <div class="filter_group">
                <label for="end_date">End Date</label>
                <input type="date" id="end_date" name="end_date" value="">
            </div>
        </div>
        
        <div class="action_buttons">
            <button type="button" class="btn btn_run" onclick="runReport()">
                🎯 Run Report
            </button>
            <button type="button" class="btn btn_clear" onclick="clearFilters()">
                🔄 Clear Filters
            </button>
            <button type="button" class="btn btn_export" onclick="exportToCSV()">
                📊 Export CSV
            </button>
        </div>
    </div>
    
    <!-- Summary Statistics -->
    <div id="summarySection" class="summary_stats">
        <div class="summary_title">📊 Suite Execution Summary</div>
        <div class="stats_grid">
            <div class="stat_item stat_total">
                <div class="stat_value" id="totalSuites">0</div>
                <div class="stat_label">Total Suites</div>
            </div>
            <div class="stat_item stat_passed">
                <div class="stat_value" id="passedCount">0</div>
                <div class="stat_label">Passed</div>
            </div>
            <div class="stat_item stat_failed">
                <div class="stat_value" id="failedCount">0</div>
                <div class="stat_label">Failed</div>
            </div>
            <div class="stat_item stat_blocked">
                <div class="stat_value" id="blockedCount">0</div>
                <div class="stat_label">Blocked</div>
            </div>
            <div class="stat_item stat_not_run">
                <div class="stat_value" id="notRunCount">0</div>
                <div class="stat_label">Not Run</div>
            </div>
        </div>
    </div>
    
    <!-- Results Table -->
    <div id="resultsSection" class="results_section">
        <div class="results_title">📋 Suite Execution Details</div>
        <div id="tableContainer">
            <div class="loading">
                <div class="spinner"></div>
                <div>Loading suite execution data...</div>
            </div>
        </div>
    </div>
</div>

<!-- Notification Container -->
<div id="notification" class="notification"></div>

<script>
let currentData = [];
let isLoading = false;

// Initialize event handlers
$(document).ready(function() {
    loadInitialData();
    initializeEventHandlers();
});

function loadInitialData() {
    console.log('Loading initial suite data...');
    
    // Load projects
    $.ajax({
        url: 'suite_execution_summary_optimized.php',
        type: 'POST',
        data: {
            ajax: 1,
            action: 'get_initial_data'
        },
        dataType: 'json',
        success: function(response) {
            console.log('Suite response received:', response);
            if (response.success) {
                populateDropdowns(response.data);
            } else {
                console.error('Error in response:', response.error);
                showNotification('Error loading initial data: ' + response.error, 'error');
            }
        },
        error: function(xhr, status, error) {
            console.error('AJAX Error:', status, error);
            console.error('Response Text:', xhr.responseText);
            showNotification('Network error loading data: ' + error, 'error');
        }
    });
}

function populateDropdowns(data) {
    console.log('Populating suite dropdowns with data:', data);
    
    // Populate projects
    const $projectSelect = $('#project_id');
    $projectSelect.html('<option value="">Select Project</option>');
    if (data.projects) {
        console.log('Projects found:', data.projects);
        console.log('Projects type:', typeof data.projects);
        console.log('Projects length:', data.projects.length);
        
        // Handle different data formats
        if (Array.isArray(data.projects)) {
            data.projects.forEach(function(project, index) {
                console.log(`Project ${index}:`, project);
                console.log(`Project ${index} type:`, typeof project);
                
                let name, id;
                
                if (typeof project === 'object' && project !== null) {
                    // Object format
                    name = project.name || project.notes || `Project ${index}`;
                    id = project.id || index;
                    console.log(`Object project - name: ${name}, id: ${id}`);
                } else {
                    // Primitive format (string or number)
                    name = project.toString();
                    id = project;
                    console.log(`Primitive project - name: ${name}, id: ${id}`);
                }
                
                $projectSelect.append(`<option value="${id}">${name}</option>`);
            });
        } else if (typeof data.projects === 'object') {
            // Handle object format (key-value pairs)
            Object.keys(data.projects).forEach(function(key) {
                const project = data.projects[key];
                const name = project.name || project.notes || project.toString();
                const id = project.id || key;
                console.log(`Object key-value project - name: ${name}, id: ${id}`);
                $projectSelect.append(`<option value="${id}">${name}</option>`);
            });
        }
    } else {
        console.log('No projects data found');
    }
}

function initializeEventHandlers() {
    $('#project_id').on('change', function() {
        const projectId = $(this).val();
        loadTestPlans(projectId);
    });
    
    $('#testplan_id').on('change', function() {
        const planId = $(this).val();
        loadBuilds(planId);
    });
}

function loadTestPlans(projectId) {
    const $planSelect = $('#testplan_id');
    $planSelect.html('<option value="">Select Test Plan</option>');
    
    if (!projectId) {
        return;
    }
    
    $.ajax({
        url: 'suite_execution_summary_optimized.php',
        type: 'POST',
        data: {
            ajax: 1,
            action: 'get_testplans',
            project_id: projectId
        },
        dataType: 'json',
        success: function(response) {
            console.log('Test plans response:', response);
            if (response.success && response.testplans) {
                console.log('Test plans data:', response.testplans);
                console.log('Test plans type:', typeof response.testplans);
                console.log('Is array?', Array.isArray(response.testplans));
                
                // Handle different data formats
                let testplans = response.testplans;
                if (!Array.isArray(testplans)) {
                    if (typeof testplans === 'object') {
                        // Convert object to array
                        testplans = Object.keys(testplans).map(key => testplans[key]);
                        console.log('Converted testplans to array:', testplans);
                    } else {
                        console.error('Test plans is not an array or object');
                        return;
                    }
                }
                
                testplans.forEach(function(plan) {
                    console.log('Adding test plan:', plan);
                    $planSelect.append(`<option value="${plan.id}">${plan.name}</option>`);
                });
            } else {
                console.error('No test plans in response or success=false');
            }
        },
        error: function() {
            console.error('Error loading test plans');
        }
    });
}

function loadBuilds(planId) {
    const $buildSelect = $('#build_id');
    $buildSelect.html('<option value="">Select Build</option>');
    
    if (!planId) {
        return;
    }
    
    $.ajax({
        url: 'suite_execution_summary_optimized.php',
        type: 'POST',
        data: {
            ajax: 1,
            action: 'get_builds',
            testplan_id: planId
        },
        dataType: 'json',
        success: function(response) {
            console.log('Builds response:', response);
            if (response.success && response.builds) {
                console.log('Builds data:', response.builds);
                console.log('Builds type:', typeof response.builds);
                console.log('Is array?', Array.isArray(response.builds));
                
                // Handle different data formats
                let builds = response.builds;
                if (!Array.isArray(builds)) {
                    if (typeof builds === 'object') {
                        // Convert object to array
                        builds = Object.keys(builds).map(key => builds[key]);
                        console.log('Converted builds to array:', builds);
                    } else {
                        console.error('Builds is not an array or object');
                        return;
                    }
                }
                
                builds.forEach(function(build) {
                    console.log('Adding build:', build);
                    $buildSelect.append(`<option value="${build.id}">${build.name}</option>`);
                });
            } else {
                console.error('No builds in response or success=false');
            }
        },
        error: function() {
            console.error('Error loading builds');
        }
    });
}

function runReport() {
    if (isLoading) return;
    
    const formData = {
        ajax: 1,
        action: 'run_report',
        project_id: $('#project_id').val(),
        testplan_id: $('#testplan_id').val(),
        build_id: $('#build_id').val(),
        start_date: $('#start_date').val(),
        end_date: $('#end_date').val()
    };
    
    if (!formData.project_id) {
        showNotification('Please select a project', 'error');
        return;
    }
    
    setLoading(true);
    
    $.ajax({
        url: 'suite_execution_summary_optimized.php',
        type: 'POST',
        data: formData,
        dataType: 'json',
        success: function(response) {
            if (response.success) {
                currentData = response.data;
                updateTable(response.data);
                updateSummary(response.summary);
                showNotification('Suite report loaded successfully', 'success');
            } else {
                showNotification(response.error || 'Error loading suite report', 'error');
            }
        },
        error: function(xhr, status, error) {
            console.error('AJAX Error:', status, error);
            showNotification('Network error: ' + error, 'error');
        },
        complete: function() {
            setLoading(false);
        }
    });
}

function updateTable(data) {
    const $container = $('#tableContainer');
    
    if (!data || data.length === 0) {
        $container.html('<div class="loading">No suite execution data found</div>');
        return;
    }
    
    let html = `
        <table class="suite_table">
            <thead>
                <tr>
                    <th>Test Suite</th>
                    <th>Total Cases</th>
                    <th>Passed</th>
                    <th>Failed</th>
                    <th>Blocked</th>
                    <th>Not Run</th>
                    <th>Pass Rate</th>
                    <th>Last Execution</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    data.forEach(function(row) {
        const passRate = row.total_cases > 0 ? ((row.passed / row.total_cases) * 100).toFixed(1) : '0.0';
        const formattedDate = row.last_execution ? new Date(row.last_execution).toLocaleString() : 'N/A';
        
        html += `
            <tr>
                <td><strong>${row.suite_name || 'N/A'}</strong></td>
                <td>${row.total_cases || 0}</td>
                <td class="status_passed">${row.passed || 0}</td>
                <td class="status_failed">${row.failed || 0}</td>
                <td class="status_blocked">${row.blocked || 0}</td>
                <td class="status_not_run">${row.not_run || 0}</td>
                <td>${passRate}%</td>
                <td>${formattedDate}</td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    $container.html(html);
}

function updateSummary(summary) {
    $('#totalSuites').text(summary.totalSuites || 0);
    $('#passedCount').text(summary.totalPassed || 0);
    $('#failedCount').text(summary.totalFailed || 0);
    $('#blockedCount').text(summary.totalBlocked || 0);
    $('#notRunCount').text(summary.totalNotRun || 0);
    
    $('#summarySection').show();
    $('#resultsSection').show();
}

function clearFilters() {
    $('#project_id, #testplan_id, #build_id').val('');
    $('#start_date, #end_date').val('');
    $('#summarySection, #resultsSection').hide();
    showNotification('Filters cleared', 'info');
}

function exportToCSV() {
    if (!currentData || currentData.length === 0) {
        showNotification('No data to export', 'error');
        return;
    }
    
    let csv = 'Test Suite,Total Cases,Passed,Failed,Blocked,Not Run,Pass Rate,Last Execution\n';
    
    currentData.forEach(function(row) {
        const passRate = row.total_cases > 0 ? ((row.passed / row.total_cases) * 100).toFixed(1) : '0.0';
        const formattedDate = row.last_execution ? new Date(row.last_execution).toLocaleString() : 'N/A';
        
        csv += `"${row.suite_name || 'N/A'}",${row.total_cases || 0},${row.passed || 0},${row.failed || 0},${row.blocked || 0},${row.not_run || 0},"${passRate}%","${formattedDate}"\n`;
    });
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'suite_execution_summary_' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click();
    window.URL.revokeObjectURL(url);
    
    showNotification('CSV exported successfully', 'success');
}

function setLoading(loading) {
    isLoading = loading;
    const $runBtn = $('.btn_run');
    
    if (loading) {
        $runBtn.html('⏳ Loading...').prop('disabled', true);
        $('#tableContainer').html('<div class="loading"><div class="spinner"></div><div>Loading suite execution data...</div></div>');
    } else {
        $runBtn.html('🎯 Run Report').prop('disabled', false);
    }
}

function showNotification(message, type) {
    const $notification = $('#notification');
    $notification.removeClass('success error info').addClass(type);
    $notification.text(message);
    $notification.addClass('show');
    
    setTimeout(function() {
        $notification.removeClass('show');
    }, 3000);
}
</script>
</body>
</html>
