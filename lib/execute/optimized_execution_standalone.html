<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Execution Module - Standalone</title>
    <link href="../../gui/themes/default/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .oem-container {
            display: flex;
            height: calc(100vh - 80px);
            margin: 10px;
            gap: 10px;
        }

        .oem-tree-pane {
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 10px;
        }

        .oem-tree-node {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 4px;
            margin-bottom: 2px;
        }

        .oem-tree-node:hover {
            background: #e9ecef;
        }

        .oem-tree-node.selected {
            background: #007bff;
            color: white;
        }

        .oem-tree-node.testsuite {
            font-weight: bold;
        }

        .oem-tree-expand {
            margin-right: 8px;
            font-family: monospace;
        }

        .oem-tree-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 8px;
        }

        .oem-status-passed { background-color: #28a745; }
        .oem-status-failed { background-color: #dc3545; }
        .oem-status-blocked { background-color: #fd7e14; }
        .oem-status-not_run { background-color: #6c757d; }

        .oem-content-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .oem-header {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }

        .oem-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .oem-stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .oem-stat-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            color: white;
        }

        .oem-testcase-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .oem-execution-pane {
            width: 350px;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        .oem-execution-header {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
        }

        .oem-execution-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .oem-quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .oem-quick-btn {
            padding: 15px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .oem-quick-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .oem-btn-pass { background: #28a745; color: white; }
        .oem-btn-fail { background: #dc3545; color: white; }
        .oem-btn-block { background: #fd7e14; color: white; }
        .oem-btn-reset { background: #6c757d; color: white; }

        .oem-loading {
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }

        .oem-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .oem-step {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            background: #f8f9fa;
        }

        .oem-step-number {
            font-weight: bold;
            color: #007bff;
            margin-bottom: 8px;
        }

        .alert-fixed {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">⚡ Optimized Execution Module</a>
            <div class="navbar-nav ms-auto">
                <select id="buildSelect" class="form-select form-select-sm" style="width: 200px;">
                    <option value="">Loading builds...</option>
                </select>
                <select id="platformSelect" class="form-select form-select-sm" style="width: 200px;">
                    <option value="">Loading platforms...</option>
                </select>
                <button class="btn btn-outline-light btn-sm ms-2" onclick="toggleBackend()">
                    <span id="backendLabel">PHP Backend</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="oem-container">
        <!-- Left Pane: Tree Navigation -->
        <div class="oem-tree-pane" id="treePane">
            <div class="oem-loading">
                <div class="oem-spinner"></div>
                Loading test suites...
            </div>
        </div>

        <!-- Center Pane: Test Case Content -->
        <div class="oem-content-pane">
            <div class="oem-header">
                <!-- Statistics Bar -->
                <div class="oem-stats">
                    <div class="oem-stat-item">
                        <span>Passed:</span>
                        <span class="oem-stat-badge oem-status-passed" id="statPassed">0</span>
                    </div>
                    <div class="oem-stat-item">
                        <span>Failed:</span>
                        <span class="oem-stat-badge oem-status-failed" id="statFailed">0</span>
                    </div>
                    <div class="oem-stat-item">
                        <span>Blocked:</span>
                        <span class="oem-stat-badge oem-status-blocked" id="statBlocked">0</span>
                    </div>
                    <div class="oem-stat-item">
                        <span>Not Run:</span>
                        <span class="oem-stat-badge oem-status-not_run" id="statNotRun">0</span>
                    </div>
                </div>
            </div>

            <div class="oem-testcase-content" id="testcaseContent">
                <div class="text-center text-muted" style="margin-top: 100px;">
                    <h4>Select a test case from the tree to begin execution</h4>
                    <p>Use the navigation tree on the left to browse test suites and test cases</p>
                </div>
            </div>
        </div>

        <!-- Right Pane: Execution Controls -->
        <div class="oem-execution-pane">
            <div class="oem-execution-header">
                Execution Controls
            </div>
            <div class="oem-execution-content" id="executionContent">
                <div class="text-center text-muted" style="margin-top: 50px;">
                    <p>Select a test case to see execution options</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../../gui/javascript/jquery-3.6.0.min.js"></script>
    <script src="../../gui/javascript/bootstrap.bundle.min.js"></script>
    <script>
        // Optimized Execution Module - Standalone Version
        var OEM = {
            currentTestCase: null,
            currentBuild: 1,
            currentPlatform: 1,
            tplanId: 1,
            usePythonBackend: false,
            
            init: function() {
                this.loadBuilds();
                this.loadPlatforms();
                this.loadTreeNodes(0);
                this.updateStats();
                this.bindEvents();
            },
            
            bindEvents: function() {
                $('#buildSelect').on('change', () => {
                    this.currentBuild = $('#buildSelect').val();
                    this.refreshAll();
                });
                
                $('#platformSelect').on('change', () => {
                    this.currentPlatform = $('#platformSelect').val();
                    this.refreshAll();
                });
            },
            
            loadBuilds: function() {
                // Mock data - replace with actual API call
                const builds = [
                    {id: 1, name: 'Build 1.0'},
                    {id: 2, name: 'Build 1.1'},
                    {id: 3, name: 'Build 2.0'}
                ];
                
                let html = '';
                builds.forEach(build => {
                    html += `<option value="${build.id}">${build.name}</option>`;
                });
                $('#buildSelect').html(html);
            },
            
            loadPlatforms: function() {
                // Mock data - replace with actual API call
                const platforms = [
                    {id: 1, name: 'Windows'},
                    {id: 2, name: 'Linux'},
                    {id: 3, name: 'macOS'}
                ];
                
                let html = '';
                platforms.forEach(platform => {
                    html += `<option value="${platform.id}">${platform.name}</option>`;
                });
                $('#platformSelect').html(html);
            },
            
            getApiUrl: function(action) {
                if (this.usePythonBackend) {
                    return `http://localhost:8000/api/${action}`;
                } else {
                    return `ajax_optimized_execution.php?action=${action}`;
                }
            },
            
            loadTreeNodes: function(parentId) {
                const treePane = $('#treePane');
                
                if (parentId === 0) {
                    treePane.html('<div class="oem-loading"><div class="oem-spinner"></div>Loading test suites...</div>');
                }
                
                const url = this.usePythonBackend ? 
                    this.getApiUrl('tree_nodes') + `?parent_id=${parentId}` :
                    this.getApiUrl('get_tree_nodes');
                
                const data = this.usePythonBackend ? {} : {
                    parent_id: parentId,
                    tplan_id: this.tplanId,
                    build_id: this.currentBuild,
                    platform_id: this.currentPlatform
                };
                
                $.ajax({
                    url: url,
                    method: this.usePythonBackend ? 'GET' : 'POST',
                    data: data,
                    success: (response) => {
                        if (response.success) {
                            this.renderTreeNodes(response.nodes, parentId);
                        } else {
                            treePane.html(`<div class="alert alert-danger">Error loading tree: ${response.error}</div>`);
                        }
                    },
                    error: () => {
                        // Fallback to mock data for demo
                        this.renderMockTree(parentId);
                    }
                });
            },
            
            renderMockTree: function(parentId) {
                const mockNodes = parentId === 0 ? [
                    {id: 1, name: 'Login Module', type: 'testsuite', testcase_count: 5, has_children: true},
                    {id: 2, name: 'Payment Module', type: 'testsuite', testcase_count: 8, has_children: true},
                    {id: 3, name: 'User Management', type: 'testsuite', testcase_count: 12, has_children: true}
                ] : [
                    {id: 101, name: 'TC001 - Valid Login', type: 'testcase', status: 'p'},
                    {id: 102, name: 'TC002 - Invalid Login', type: 'testcase', status: 'f'},
                    {id: 103, name: 'TC003 - Empty Password', type: 'testcase', status: 'n'}
                ];
                
                this.renderTreeNodes(mockNodes, parentId);
            },
            
            renderTreeNodes: function(nodes, parentId) {
                const treePane = $('#treePane');
                let html = '';
                
                nodes.forEach(node => {
                    const statusClass = 'oem-status-' + this.getStatusClass(node.status);
                    const expandIcon = node.has_children ? '▶' : '•';
                    
                    html += `<div class="oem-tree-node ${node.type}" data-id="${node.id}" data-type="${node.type}">`;
                    html += `<div class="oem-node-content">`;
                    html += `<span class="oem-tree-expand">${expandIcon}</span>`;
                    html += `<span class="oem-node-name">${node.name}</span>`;
                    
                    if (node.type === 'testcase') {
                        html += `<span class="oem-tree-status ${statusClass}"></span>`;
                    } else if (node.testcase_count > 0) {
                        html += `<span class="badge badge-secondary">${node.testcase_count}</span>`;
                    }
                    
                    html += '</div></div>';
                });
                
                if (parentId === 0) {
                    treePane.html(html);
                } else {
                    const parentNode = $(`.oem-tree-node[data-id="${parentId}"]`);
                    if (parentNode.length > 0) {
                        parentNode.after(html);
                    }
                }
                
                // Bind click events
                $('.oem-tree-node').off('click').on('click', (e) => {
                    this.onTreeNodeClick($(e.currentTarget));
                });
            },
            
            onTreeNodeClick: function(nodeElement) {
                $('.oem-tree-node').removeClass('selected');
                nodeElement.addClass('selected');
                
                const nodeId = nodeElement.data('id');
                const nodeType = nodeElement.data('type');
                
                if (nodeType === 'testsuite') {
                    this.loadTreeNodes(nodeId);
                } else if (nodeType === 'testcase') {
                    this.loadTestCase(nodeId);
                }
            },
            
            loadTestCase: function(tcversionId) {
                $('#testcaseContent').html('<div class="oem-loading"><div class="oem-spinner"></div>Loading test case...</div>');
                $('#executionContent').html('<div class="oem-loading"><div class="oem-spinner"></div>Loading execution controls...</div>');
                
                // Mock test case data for demo
                const mockData = {
                    success: true,
                    testcase: {
                        id: tcversionId,
                        name: 'TC001 - Valid Login Test',
                        summary: 'Verify that users can successfully login with valid credentials',
                        preconditions: 'User must be registered in the system',
                        version: '1.0',
                        author_login: 'testuser',
                        creation_ts: '2025-01-15 10:30:00'
                    },
                    steps: [
                        {
                            step_number: 1,
                            actions: 'Navigate to login page',
                            expected_results: 'Login page is displayed'
                        },
                        {
                            step_number: 2,
                            actions: 'Enter valid username and password',
                            expected_results: 'Credentials are accepted'
                        },
                        {
                            step_number: 3,
                            actions: 'Click login button',
                            expected_results: 'User is redirected to dashboard'
                        }
                    ],
                    execution: {
                        status: 'n',
                        tester_login: null,
                        execution_ts: null,
                        notes: ''
                    }
                };
                
                this.currentTestCase = mockData;
                this.renderTestCase(mockData);
                this.renderExecutionControls(mockData);
            },
            
            renderTestCase: function(data) {
                const testcase = data.testcase;
                const steps = data.steps;
                const execution = data.execution;
                
                let html = '<div class="oem-testcase-header">';
                html += `<div class="oem-testcase-title">${testcase.name}</div>`;
                html += '<div class="oem-testcase-meta">';
                html += `Version: ${testcase.version} | `;
                html += `Author: ${testcase.author_login} | `;
                html += `Created: ${new Date(testcase.creation_ts).toLocaleDateString()}`;
                html += '</div>';
                html += '</div>';
                
                if (testcase.summary) {
                    html += '<div class="oem-section">';
                    html += '<div class="oem-section-title">Summary</div>';
                    html += `<div>${testcase.summary}</div>`;
                    html += '</div>';
                }
                
                if (testcase.preconditions) {
                    html += '<div class="oem-section">';
                    html += '<div class="oem-section-title">Preconditions</div>';
                    html += `<div>${testcase.preconditions}</div>`;
                    html += '</div>';
                }
                
                if (steps && steps.length > 0) {
                    html += '<div class="oem-section">';
                    html += '<div class="oem-section-title">Test Steps</div>';
                    
                    steps.forEach(step => {
                        html += '<div class="oem-step">';
                        html += `<div class="oem-step-number">Step ${step.step_number}</div>`;
                        html += `<div class="oem-step-actions"><strong>Actions:</strong> ${step.actions}</div>`;
                        html += `<div class="oem-step-expected"><strong>Expected Results:</strong> ${step.expected_results}</div>`;
                        html += '</div>';
                    });
                    
                    html += '</div>';
                }
                
                $('#testcaseContent').html(html);
            },
            
            renderExecutionControls: function(data) {
                const execution = data.execution;
                const currentStatus = execution ? execution.status : 'n';
                
                let html = '';
                
                // Quick action buttons
                html += '<div class="oem-quick-actions">';
                html += `<button class="oem-quick-btn oem-btn-pass" onclick="OEM.executeTest('p')">✓ PASS</button>`;
                html += `<button class="oem-quick-btn oem-btn-fail" onclick="OEM.executeTest('f')">✗ FAIL</button>`;
                html += `<button class="oem-quick-btn oem-btn-block" onclick="OEM.executeTest('b')">⚠ BLOCK</button>`;
                html += `<button class="oem-quick-btn oem-btn-reset" onclick="OEM.executeTest('n')">↺ RESET</button>`;
                html += '</div>';
                
                // Current status display
                html += '<div class="oem-section">';
                html += '<div class="oem-section-title">Current Status</div>';
                html += `<div style="font-size: 18px; font-weight: bold; color: ${this.getStatusColor(currentStatus)};">`;
                html += this.getStatusText(currentStatus);
                html += '</div>';
                html += '</div>';
                
                // Notes section
                html += '<div class="oem-notes-section">';
                html += '<div class="oem-section-title">Execution Notes</div>';
                html += '<textarea class="form-control mb-2" id="executionNotes" rows="4" placeholder="Enter execution notes here...">';
                if (execution && execution.notes) {
                    html += execution.notes;
                }
                html += '</textarea>';
                html += '<button class="btn btn-primary w-100" onclick="OEM.saveExecution()">Save Execution</button>';
                html += '</div>';
                
                $('#executionContent').html(html);
            },
            
            executeTest: function(status) {
                this.currentStatus = status;
                this.saveExecution();
            },
            
            saveExecution: function() {
                if (!this.currentTestCase) return;
                
                const notes = $('#executionNotes').val();
                const status = this.currentStatus || 'n';
                
                // Mock save for demo
                this.showSuccessMessage('Execution saved successfully');
                this.updateStats();
                
                // Update current test case status
                if (this.currentTestCase.execution) {
                    this.currentTestCase.execution.status = status;
                    this.currentTestCase.execution.notes = notes;
                }
            },
            
            updateStats: function() {
                // Mock stats update - replace with actual API call
                $('#statPassed').text(Math.floor(Math.random() * 50));
                $('#statFailed').text(Math.floor(Math.random() * 20));
                $('#statBlocked').text(Math.floor(Math.random() * 10));
                $('#statNotRun').text(Math.floor(Math.random() * 100));
            },
            
            refreshAll: function() {
                this.loadTreeNodes(0);
                this.updateStats();
                if (this.currentTestCase) {
                    this.loadTestCase(this.currentTestCase.testcase.id);
                }
            },
            
            getStatusClass: function(status) {
                switch (status) {
                    case 'p': return 'passed';
                    case 'f': return 'failed';
                    case 'b': return 'blocked';
                    default: return 'not_run';
                }
            },
            
            getStatusText: function(status) {
                switch (status) {
                    case 'p': return 'Passed';
                    case 'f': return 'Failed';
                    case 'b': return 'Blocked';
                    case 'n': return 'Not Run';
                    default: return 'Unknown';
                }
            },
            
            getStatusColor: function(status) {
                switch (status) {
                    case 'p': return '#28a745';
                    case 'f': return '#dc3545';
                    case 'b': return '#fd7e14';
                    case 'n': return '#6c757d';
                    default: return '#6c757d';
                }
            },
            
            showSuccessMessage: function(message) {
                const alert = $(`<div class="alert alert-success alert-fixed">${message}</div>`);
                $('body').append(alert);
                setTimeout(() => alert.fadeOut(), 3000);
            },
            
            showErrorMessage: function(message) {
                const alert = $(`<div class="alert alert-danger alert-fixed">${message}</div>`);
                $('body').append(alert);
                setTimeout(() => alert.fadeOut(), 5000);
            }
        };
        
        // Backend toggle function
        function toggleBackend() {
            OEM.usePythonBackend = !OEM.usePythonBackend;
            $('#backendLabel').text(OEM.usePythonBackend ? 'Python Backend' : 'PHP Backend');
            OEM.refreshAll();
            
            if (OEM.usePythonBackend) {
                OEM.showSuccessMessage('Switched to Python backend mode');
            } else {
                OEM.showSuccessMessage('Switched to PHP backend mode');
            }
        }
        
        // Initialize on page load
        $(document).ready(function() {
            OEM.init();
        });
    </script>
</body>
</html>
